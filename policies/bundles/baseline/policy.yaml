{
  "id": "baseline",
  "version": "0.1.0",
  "description": "Baseline gates for VibeGuard v0",
  "include_paths": ["**"],
  "exclude_paths": [".git/**"],
  "gates": [
    {
      "id": "VG001",
      "enabled": true,
      "config": {}
    },
    {
      "id": "VG002",
      "enabled": true,
      "config": {
        "forbidden": [
          "node_modules",
          "dist",
          "build",
          ".next",
          ".venv",
          "__pycache__",
          ".env",
          "secrets"
        ],
        "allow": []
      }
    },
    {
      "id": "VG003",
      "enabled": true,
      "config": {
        "allow_paths": [
          "apps/**/tests/**",
          "spec/**",
          "**/*.md",
          "packages/gates/**"
        ],
        "allow_patterns": []
      }
    },
    {
      "id": "VG004",
      "enabled": true,
      "config": {
        "require_license": true,
        "require_third_party_notices": false,
        "license_paths": ["LICENSE", "LICENSE.md", "LICENSE.txt"],
        "notices_paths": ["THIRD_PARTY_NOTICES.md", "THIRD_PARTY_NOTICES.txt"]
      }
    },
    {
      "id": "VG005",
      "enabled": true,
      "config": {
        "required_workflows": [".github/workflows/verify.yml"]
      }
    }
  ]
}
