name: verify

on:
  pull_request:
  push:
    branches: [main]

env:
  PRE_COMMIT_HOME: ${{ github.workspace }}/.pc-home
  TMPDIR: /tmp
  PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/apps/cli

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e apps/cli
      - name: Run verify
        run: make verify
      - name: Run vibeguard baseline policy
        run: vibeguard check . --policy policies/bundles/baseline/policy.yaml
