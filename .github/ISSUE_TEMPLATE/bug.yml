name: Bug
description: Report a defect
labels: ["bug", "needs-spec"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened vs expected?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Steps to reproduce
    validations:
      required: true
